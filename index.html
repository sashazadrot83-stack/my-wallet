<!DOCTYPE html>
<html>

  <meta name="apple-mobile-web-app-capable" content="yes">

  <title>Гаманець 💰</title>

  <style>
  body, html { 
    margin: 0; padding: 0; height: 100%; width: 100%; 
    overflow: hidden; background-color: #f2f2f7; /* Світло-сірий фон iOS */
  }
  iframe { 
    width: 100%; 
    height: 100%; 
    border: none; 
    /* Відступ зверху для Dynamic Island */
    margin-top: env(safe-area-inset-top); 
    /* Висота з урахуванням усіх відступів */
    height: calc(100% - env(safe-area-inset-top) - env(safe-area-inset-bottom));
  }
</style>
</head>
<body>
  <iframe src="https://script.google.com/macros/s/AKfycbypN-F8Q_fkbPY7R6DxDzOTdjQq0lVS3KISLq2duuaoVkOFnzmST_4UhsMtqMY_VGrY/exec" allow="camera; microphone; geolocation"></iframe>
</body>
</html>
