<!DOCTYPE html>
<html>

  <!-- Ці два рядки змушують iOS приховати панелі браузера -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  body, html { 
    margin: 0; padding: 0; height: 100%; width: 100%; 
    overflow: hidden; 
    background-color: #000000; /* Колір під колір твого додатку */
  }
  iframe { 
    position: absolute;
    /* Притискаємо до нижнього краю */
    bottom: 0; 
    left: 0;
    width: 100%;
    /* Робимо висоту на 100% екрана, ігноруючи системні відступи */
    height: 100%;
    border: none;
    /* Відключаємо будь-які зовнішні відступи */
    margin: 0;
    padding: 0;
  }
</style>
</head>
