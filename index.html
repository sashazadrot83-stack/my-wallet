 <style>
  html, body { 
    margin: 0; padding: 0; width: 100%; height: 100%; 
    background-color: #000000; overflow: hidden; 
    /* Додаємо плавну прокрутку для iOS, якщо вона знадобиться всередині */
    -webkit-overflow-scrolling: touch; 
  }
  iframe { 
    width: 100%; 
    /* При position: absolute краще використовувати 100% замість 100vh, це стабільніше на Айфоні */
    height: 100%; 
    border: none; 
    display: block;
    position: absolute;
    top: 0;
    left: 0;
  }
</style>
</head>
<body>
  <iframe 
    src="https://script.google.com/macros/s/AKfycbyJdt5ifJt34BLxJWK3VZYm4d78KuQ-V8_nhf3r0Mt160j0IXAc1FUdNvHYUR2tvIP8/exec"
