<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Гаманець 💰</title>
  
  <style>
    html, body { 
      margin: 0; 
      padding: 0; 
      width: 100%; 
      height: 100%; 
      /* Цей колір буде у "смуги" зверху */
      background-color: #000000; 
      overflow: hidden;
    }
    
    iframe { 
      display: block;
      width: 100%;
      /* Висота = 100% мінус висота системної зони зверху */
      height: calc(100% - env(safe-area-inset-top));
      /* Опускаємо iframe вниз на висоту цієї зони */
      margin-top: env(safe-area-inset-top);
      border: none;
    }
  </style>
</head>
<body>
  <iframe src="https://script.google.com/macros/s/AKfycbx-iJz3XHxey_XLRmZlT1uak0kJsusPZt25Fgy4uZUbgZHMYrdXSbYzsMGm2A3Lv24/exec"></iframe>
</body>
</html>
